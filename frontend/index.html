<!doctype html>
<html lang="en" prefix="og: https://ogp.me/ns#">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="apple-touch-icon" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    content="Swasthya Mitra is a real-time clinical management and digital health locker platform with live queue tracking, lab referrals, OTP-secured patient access, and role-based clinic dashboards." />
  <meta name="keywords"
    content="Swasthya Mitra, clinic management system, patient queue management, digital health locker, medical records, lab referral system, healthcare dashboard, MERN healthcare app, hospital token system" />
  <meta name="author" content="Swasthya Mitra Team" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="googlebot" content="index, follow" />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="application-name" content="Swasthya Mitra" />

  <link rel="canonical" href="/" id="canonical-link" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Swasthya Mitra" />
  <meta property="og:title" content="Swasthya Mitra | Real-time Clinical Management & Digital Health Locker" />
  <meta property="og:description"
    content="A comprehensive MERN healthcare platform with live queue monitoring, instant lab referrals, patient OTP login, and secure medical record access." />
  <meta property="og:image" content="/og-image.svg" />
  <meta property="og:image:alt" content="Swasthya Mitra healthcare platform" />
  <meta property="og:url" content="/" id="og-url" />
  <meta property="og:locale" content="en_US" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Swasthya Mitra | Real-time Clinical Management & Digital Health Locker" />
  <meta name="twitter:description"
    content="Live queue tracking, digital health vault, smart medical timeline, and role-based clinic dashboards in one platform." />
  <meta name="twitter:image" content="/og-image.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <script>
    (function () {
      const canonical = document.getElementById('canonical-link');
      const ogUrl = document.getElementById('og-url');
      const pageUrl = window.location.origin + '/';

      if (canonical) canonical.setAttribute('href', pageUrl);
      if (ogUrl) ogUrl.setAttribute('content', pageUrl);

      const websiteSchema = {
        '@context': 'https://schema.org',
        '@type': 'WebSite',
        name: 'Swasthya Mitra',
        url: pageUrl,
        inLanguage: 'en',
        description:
          'A real-time clinical management and digital health locker platform for clinics and patients.',
      };

      const appSchema = {
        '@context': 'https://schema.org',
        '@type': 'SoftwareApplication',
        name: 'Swasthya Mitra',
        applicationCategory: 'HealthApplication',
        operatingSystem: 'Web Browser',
        url: pageUrl,
        image: window.location.origin + '/og-image.svg',
        description:
          'A MERN-stack clinical management system with real-time queueing, lab referrals, and secure patient health records.',
        featureList: [
          'Real-time queue management with Socket.io',
          'Role-based dashboards for clinic staff',
          'OTP-secured patient digital health locker',
          'Instant lab referral and result synchronization',
          'Unified timeline for visits and reports',
        ],
      };

      const faqSchema = {
        '@context': 'https://schema.org',
        '@type': 'FAQPage',
        mainEntity: [
          {
            '@type': 'Question',
            name: 'What is Swasthya Mitra?',
            acceptedAnswer: {
              '@type': 'Answer',
              text: 'Swasthya Mitra is a clinical management and digital health locker platform that connects clinics and patients using real-time queues and secure records.',
            },
          },
          {
            '@type': 'Question',
            name: 'Who can use Swasthya Mitra?',
            acceptedAnswer: {
              '@type': 'Answer',
              text: 'Admins, doctors, receptionists, lab technicians, and patients can use role-based interfaces designed for their workflows.',
            },
          },
          {
            '@type': 'Question',
            name: 'How are patient records secured?',
            acceptedAnswer: {
              '@type': 'Answer',
              text: 'Patients access their digital health locker via OTP authentication and can securely view consultation notes, reports, and medical files.',
            },
          },
        ],
      };

      [websiteSchema, appSchema, faqSchema].forEach((item) => {
        const tag = document.createElement('script');
        tag.type = 'application/ld+json';
        tag.text = JSON.stringify(item);
        document.head.appendChild(tag);
      });
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
